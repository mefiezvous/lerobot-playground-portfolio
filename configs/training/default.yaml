defaults:
  - env: cube_reach_v1
  - policy: act
  - eval: default
  - _self_

dataset:
  repo_id: mefiezvous/cube-reach-v1-dataset
  root: null

training:
  total_steps: 10000
  save_every_steps: 1000
  checkpoint_dir: checkpoints/
  batch_size: 64
  num_envs: 4
  device: cpu
  mixed_precision: false
  seed: 42
  lr: 1.0e-4

hf_repo_id: null        # ex: "mefiezvous/cube-reach-v1-act"
push_every: 500         # steps between each HF Hub push
keep_last_n: 3          # local checkpoints to keep

logging:
  backend: mlflow
  mlflow_tracking_uri: mlruns/
  experiment_name: cube_reach_v1_default
  run_name: ???
