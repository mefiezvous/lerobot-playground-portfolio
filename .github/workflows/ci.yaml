name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - run: uv run ruff check src/ tests/
      - run: uv run ruff format --check src/ tests/

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - run: uv run mypy src/

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - run: uv run pytest tests/ -m "not gpu" --cov=src --cov-fail-under=70

  anti-leak:
    name: Anti-leak audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run anti-leak grep audit
        run: |
          FAIL=0
          for pattern in "_private/" "my-robot-stack/" "proprietary_" "LicenseRef-Proprietary" "All Rights Reserved"; do
            if grep -r --include="*.py" --include="*.yaml" --include="*.md" --include="*.toml" \
                    "$pattern" src/ configs/ 2>/dev/null; then
              echo "LEAK DETECTED: $pattern"
              FAIL=1
            fi
          done
          [ "$FAIL" -eq 0 ] && echo "Anti-leak check: PASSED" || exit 1
